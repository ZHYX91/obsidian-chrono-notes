name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Verify release version
        run: node scripts/check-release-version.mjs "$GITHUB_REF_NAME"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gates
        run: pnpm release:check

      - name: Build manual installation archive
        shell: bash
        run: |
          archive_root="$RUNNER_TEMP/chrono-notes"
          archive_path="$GITHUB_WORKSPACE/dist/chrono-notes/chrono-notes-${GITHUB_REF_NAME}.zip"
          mkdir -p "$archive_root"
          cp \
            dist/chrono-notes/main.js \
            dist/chrono-notes/manifest.json \
            dist/chrono-notes/styles.css \
            "$archive_root/"
          (
            cd "$RUNNER_TEMP"
            zip -q "$archive_path" \
              chrono-notes/main.js \
              chrono-notes/manifest.json \
              chrono-notes/styles.css
          )
          test "$(unzip -Z1 "$archive_path")" = "$(printf '%s\n' \
            chrono-notes/main.js \
            chrono-notes/manifest.json \
            chrono-notes/styles.css)"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            dist/chrono-notes/main.js \
            dist/chrono-notes/manifest.json \
            dist/chrono-notes/styles.css \
            "dist/chrono-notes/chrono-notes-${GITHUB_REF_NAME}.zip"
          )
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
