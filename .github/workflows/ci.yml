name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check, test, and build
        run: pnpm check

      - name: Test deterministic date behavior across time zones
        run: pnpm test:timezones

      - name: Run the quick algorithmic benchmark gate
        run: pnpm bench:quick

      - name: Generate coverage report
        run: pnpm test:coverage

      - name: Report production artifact gate
        run: pnpm artifact:check -- --details

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: chrono-notes-coverage
          path: coverage/
          if-no-files-found: error

      - name: Upload production plugin
        uses: actions/upload-artifact@v7
        with:
          name: chrono-notes-production
          path: |
            dist/chrono-notes/
            dist/chrono-notes.meta.json
          if-no-files-found: error
